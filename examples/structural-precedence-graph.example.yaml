    trace_refs:
      - trace-temporal-workspace-001

    origin_refs:
      - origin-temporal-workspace-question

  - node_id: node-structural-translation
    structure_id: structure-structural-translation
    node_type: active_structure

    temporal_position:
      sequence_index: 0
      logical_time: "t0"
      observed_at: "2026-07-10T18:18:41Z"

    label: Structural Translation Layer

    summary: >
      Structural translation preserves representable meaning and dependency
      across heterogeneous structural systems.

    state_record_refs:
      - tsr-2026-0001

    trace_refs:
      - trace-structural-translation-001

    origin_refs:
      - origin-structural-translator

  - node_id: node-transition-map
    structure_id: structure-state-transition-map
    node_type: transition_result

    temporal_position:
      sequence_index: 1
